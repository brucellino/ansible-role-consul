---
- name: Install | Add prerequisites
  ansible.builtin.package:
    name: "{{ prerequisites[ansible_facts.distribution_release] }}"
    state: present

- name: If the version ceiling is defined, use it; otherwise, use the declared version
  ansible.builtin.debug:
    msg: >-
      "{{ consul_version_ceiling[ansible_facts.machine] is defined | ternary(consul_version, consul_version_ceiling[ansible_facts.machine]) }}"

- name: Set desired version to ceiling if defined, else declared version
  ansible.builtin.set_fact:
    consul_version_desired: consul_version_ceiling[ansible_facts.machine] is defined | ternary(consul_version, consul_version_ceiling[ansible_facts.machine])


- name: Check desired version
  ansible.builtin.debug:
    msg: consul_version_desired


- name: Check if the ceiling is broken by comparing the ceiling to the declared version
  ansible.builtin.debug:
    msg: >-
      "{{ '1.21.1' is version('1.7.1', '<=') }}"

- name: Check if the ceiling is broken by comparing the ceiling to the declared version
  ansible.builtin.debug:
    msg: >-
      "{{ consul_version_desired is version('consul_version_ceiling[ansible_facts.machine]', '<=') }}"

- name: Check if the declared version is greater than the version ceiling for this arch
  ansible.builtin.set_fact:
    broken_ceiling: >-
      "{{ consul_version is
      version_compare(
      consul_version_ceiling[ansible_facts.machine] | default(consul_version),
      '<='
      )
      | bool }}"

- name: Check version ceiling broken
  ansible.builtin.debug:
    msg: "Version ceiling broken: {{ broken_ceiling }}"

- name: Install | Ensure Consul is executable
  block:
    - name: Test execution
      ansible.builtin.command: consul --version
      register: consul_version_test
      changed_when: false
    - name: Test assertion
      ansible.builtin.assert:
        that:
          - "consul_version in consul_version_test.stdout"
        success_msg: "Consul version {{ consul_version }} is ready"
        fail_msg: "Consul was not successfully installed"
  rescue:
    # Ensure the correct version is present, removing the existing one
    - name: Install | Ensure old consul is gone
      become: true
      ansible.builtin.file:
        path: /bin/consul
        state: absent

    - name: Install | Unpack Consul
      become: true
      ansible.builtin.unarchive:
        src: "{{ consul_zip_url }}"
        dest: /bin/
        owner: root
        group: root
        remote_src: true
        mode: "0777"

- name: Install | Give consul low port permissions
  become: true
  community.general.capabilities:
    path: /bin/consul
    capability: cap_net_bind_service=+ep
    state: present
  when: consul_port < 1024

- name: Install | Ensure Consul Template is executable
  block:
    - name: Test execution
      ansible.builtin.command: consul-template --version
      register: consul_template_version_test
      changed_when: false

    - name: Test Template assertion
      ansible.builtin.assert:
        that:
          - "consul_template_version in consul_template_version_test.stdout"
        success_msg: "Consul Template version {{ consul_template_version }} is ready"
        fail_msg: "Consul Template was not successfully installed"
  rescue:
    # Ensure the correct version is present, removing the existing one
    - name: Ensure old Consul Template is gone
      become: true
      ansible.builtin.file:
        path: /bin/consul-template
        state: absent

    - name: Install | Unpack Consul Template
      become: true
      ansible.builtin.unarchive:
        src: "{{ consul_template_url }}/{{ consul_template_version }}/consul-template_{{ consul_template_version }}_linux_{{ arch[ansible_architecture] }}.zip" # noqa yaml[line-length]
        dest: /bin/
        owner: root
        group: root
        remote_src: true
        mode: "0777"

- name: Install | Ensure config directory
  ansible.builtin.file:
    path: "{{ consul_config_dir }}"
    state: directory
    mode: "0777"
    owner: root
    group: root

- name: Install | Ensure consul group
  become: true
  ansible.builtin.group:
    name: consul
    state: present

- name: Install | Ensure consul user
  become: true
  ansible.builtin.user:
    name: consul
    state: present
    group: consul
    groups: "{{ consul_user_groups[ansible_distribution | lower] }}"
    append: true
    create_home: false
    generate_ssh_key: false

- name: Install | Ensure agent data directory
  become: true
  ansible.builtin.file:
    path: "{{ consul_data_dir }}"
    state: directory
    owner: consul
    group: consul
    mode: "0777"

- name: Install | Ensure agent certificate directory
  become: true
  ansible.builtin.file:
    path: "{{ consul_certs_dir }}"
    state: directory
    owner: consul
    group: consul
    mode: "0777"

- name: Install | Ensure Logging directory
  become: true
  ansible.builtin.file:
    path: "{{ consul_log_dir }}"
    state: directory
    mode: "0777"
    owner: consul
    group: consul
